name: Fetch Latest IPs

on:
  schedule:
    # Every Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:  # Manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch latest from foryVERX
        run: python fetch_foryverx.py

      - name: Check for changes
        id: changed
        run: |
          if git diff --quiet ow2-servers.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected:"
            git diff --stat ow2-servers.json
          fi

      - name: Commit and push
        if: steps.changed.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ow2-servers.json
          git commit -m "chore: sync with foryVERX $(date -u '+%Y-%m-%d')"
          git push

      - name: Create pull request
        if: steps.changed.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync with foryVERX ${{ github.event.inputs.date || github.event.schedule }}"
          title: "chore: sync with foryVERX $(date -u '+%Y-%m-%d')"
          body: |
            Auto-synced latest OW2 server IP ranges from [foryVERX/Overwatch-Server-Selector](https://github.com/foryVERX/Overwatch-Server-Selector).

            This PR updates `ow2-servers.json` with the latest IP CIDR lists.

            _Generated by [ow2-server-list](https://github.com/${{ github.repository }}) GitHub Actions._
          branch: chore/sync-foryverx
          delete-branch: true
